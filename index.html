<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>フレーム写真ツール</title>
<style>
  :root{
    --lav:#b89ac9; --lav-dark:#8e6aa8; --cream:#fdf6ec; --panel:#f3e9f5;
    --ink:#5a4a63; --accent:#e8b4c8;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  [hidden]{ display:none !important; }
  html,body{ margin:0; padding:0; background:var(--cream); color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif;
    overscroll-behavior:none; }
  header{ text-align:center; padding:14px 10px 6px; font-size:19px; font-weight:700;
    color:var(--lav-dark); letter-spacing:.06em; }
  header small{ display:block; font-size:11px; font-weight:400; color:#a08db0; margin-top:2px; }
  main{ max-width:560px; margin:0 auto; padding:0 12px 30px; }

  .steps{ display:flex; gap:8px; margin:8px 0 10px; }
  .btn{ flex:1; display:flex; align-items:center; justify-content:center; text-align:center;
    background:#fff; border:2px solid var(--lav); color:var(--lav-dark); border-radius:14px;
    padding:12px 4px; font-size:14px; font-weight:700; cursor:pointer; user-select:none;
    box-shadow:0 2px 6px rgba(140,110,170,.12); }
  .btn:active{ transform:scale(.97); }
  .btn.primary{ background:var(--lav); color:#fff; border-color:var(--lav); }
  .btn.done{ border-color:#9cc79c; color:#5f8f5f; }
  .btn[disabled]{ opacity:.4; pointer-events:none; }

  #canvasWrap{ position:relative; border-radius:16px; overflow:hidden;
    background:repeating-conic-gradient(#ece2f0 0 25%, #f8f2fa 0 50%) 0 0/24px 24px;
    box-shadow:0 4px 14px rgba(140,110,170,.18); min-height:200px; }
  #canvasWrap.drag{ outline:3px dashed var(--lav); outline-offset:-6px; }
  #cv{ display:block; width:100%; height:auto; touch-action:none; }
  #placeholder{ position:absolute; inset:0; display:flex; flex-direction:column; gap:6px;
    align-items:center; justify-content:center; text-align:center; font-size:14px;
    color:#a08db0; padding:30px; pointer-events:none; }
  #placeholder .big{ font-size:34px; }

  #controls{ margin-top:12px; background:#fff; border-radius:16px; padding:12px 14px;
    box-shadow:0 2px 10px rgba(140,110,170,.12); }
  .seg{ display:flex; background:var(--panel); border-radius:12px; padding:4px; gap:4px; margin-bottom:10px; }
  .seg button{ flex:1; border:0; background:transparent; border-radius:9px; padding:10px 4px;
    font-size:14px; font-weight:700; color:#a08db0; cursor:pointer; font-family:inherit; }
  .seg button.on{ background:#fff; color:var(--lav-dark); box-shadow:0 1px 4px rgba(140,110,170,.25); }
  .seg button[disabled]{ opacity:.4; }
  .sliderRow{ display:flex; align-items:center; gap:10px; font-size:13px; margin:8px 0; }
  .sliderRow label{ width:3.5em; flex-shrink:0; font-weight:700; }
  .sliderRow input[type=range]{ flex:1; accent-color:var(--lav); height:28px; }
  .checkRow{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700;
    margin:10px 2px 2px; cursor:pointer; }
  .checkRow input{ width:18px; height:18px; accent-color:var(--lav); }
  #textInput{ width:100%; border:1.5px solid var(--panel); border-radius:10px; padding:9px 10px;
    font-size:15px; font-family:inherit; color:var(--ink); resize:none; margin:2px 0 6px; background:#fdfbff; }
  #fontSelect{ width:100%; border:1.5px solid var(--panel); border-radius:10px; padding:9px 10px;
    font-size:14px; font-family:inherit; color:var(--ink); background:#fdfbff; margin:0 0 4px; }
  .swRow{ display:flex; align-items:center; gap:7px; margin:8px 0; flex-wrap:wrap; font-size:13px; }
  .swRow b{ width:3.5em; flex-shrink:0; }
  #swatches{ display:flex; gap:7px; flex-wrap:wrap; }
  .sw{ width:27px; height:27px; border-radius:50%; border:2px solid #fff;
    box-shadow:0 0 0 1.5px #d8c8e2; cursor:pointer; padding:0; }
  .sw.on{ box-shadow:0 0 0 2.5px var(--lav-dark); }
  .colorPick{ width:34px; height:30px; border:1.5px solid var(--panel); border-radius:8px; padding:1px; background:#fff; }
  .rowBtns{ display:flex; gap:8px; margin-top:10px; }
  .rowBtns button{ flex:1; border:1.5px solid var(--lav); background:#fff; color:var(--lav-dark);
    border-radius:10px; padding:9px 4px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .hint{ font-size:12px; color:#a08db0; margin:10px 2px 0; line-height:1.7; }

  #modal{ position:fixed; inset:0; background:rgba(90,74,99,.45); display:none;
    align-items:center; justify-content:center; padding:16px; z-index:10; }
  #modal.show{ display:flex; }
  #modalCard{ background:#fff; border-radius:18px; padding:16px; max-width:420px; width:100%;
    max-height:92vh; overflow:auto; text-align:center; }
  #modalCard h3{ margin:2px 0 10px; color:var(--lav-dark); font-size:16px; }
  #resultImg{ width:100%; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
  #modalCard .rowBtns{ margin-top:12px; }
  #modalCard .rowBtns .main{ background:var(--lav); color:#fff; }
  #modalCard .note{ font-size:11px; color:#a08db0; margin-top:8px; }
</style>
</head>
<body>
<header>🌿 フレーム写真ツール
  <small>フレームの枠に写真をはめて、インスタ用画像を作ります（画像はどこにも送信されません）</small>
</header>
<main>
  <div class="steps">
    <label class="btn" id="btnFrame">① フレーム<input type="file" id="frameInput" accept="image/*,.heic,.heif" hidden></label>
    <label class="btn" id="btnPhoto">② 写真<input type="file" id="photoInput" accept="image/*,.heic,.heif" hidden></label>
    <button class="btn primary" id="btnSave" disabled>③ 保存</button>
  </div>

  <div id="canvasWrap">
    <canvas id="cv" width="10" height="10"></canvas>
    <div id="placeholder">
      <span class="big">🖼️</span>
      「① フレーム」からフレーム画像を選んでください<br>
      （パソコンならここにドラッグ＆ドロップでもOK）
    </div>
  </div>

  <div id="controls" hidden>
    <div class="seg">
      <button id="modeFrame" class="on">🔧 枠</button>
      <button id="modePhoto" disabled>🤏 写真</button>
      <button id="modeText" disabled>✏️ 文字</button>
    </div>
    <div class="sliderRow" id="rowAngle">
      <label>傾き</label><input type="range" id="angleSlider" min="-20" max="20" step="0.2" value="0"><span id="angleVal" style="width:3.2em;text-align:right;font-size:12px;">0°</span>
    </div>
    <div class="sliderRow" id="rowRadius">
      <label>角丸</label><input type="range" id="radiusSlider" min="0" max="30" step="0.5" value="5">
    </div>
    <div class="sliderRow" id="rowZoom" hidden>
      <label>拡大</label><input type="range" id="zoomSlider" min="1" max="4" step="0.01" value="1">
    </div>
    <div class="sliderRow" id="rowBright" hidden>
      <label>明るさ</label><input type="range" id="brightSlider" min="-100" max="100" step="1" value="0">
    </div>
    <div class="sliderRow" id="rowWarm" hidden>
      <label>暖かさ</label><input type="range" id="warmSlider" min="-100" max="100" step="1" value="0">
    </div>
    <div class="rowBtns" id="rowCutBg" hidden>
      <button id="btnCutBg">✂️ 背景を消す</button>
      <button id="btnRestoreBg" hidden>↩️ 元に戻す</button>
    </div>
    <div id="textControls" hidden>
      <textarea id="textInput" rows="2" placeholder="ここに文字を入力（改行もOK）"></textarea>
      <select id="fontSelect"></select>
      <div class="sliderRow"><label>大きさ</label><input type="range" id="textSizeSlider" min="2" max="25" step="0.2" value="8"></div>
      <div class="sliderRow"><label>カーブ</label><input type="range" id="textCurveSlider" min="-100" max="100" step="1" value="0"></div>
      <div class="sliderRow"><label>傾き</label><input type="range" id="textAngleSlider" min="-45" max="45" step="0.5" value="0"></div>
      <div class="swRow"><b>文字色</b><span id="swatches"></span><input type="color" id="textColorPick" class="colorPick" value="#ffffff"></div>
      <div class="swRow"><b>フチ</b><input type="checkbox" id="textOutlineChk" checked style="width:18px;height:18px;accent-color:var(--lav);"><input type="color" id="outlineColorPick" class="colorPick" value="#8e6aa8"></div>
      <div class="rowBtns">
        <button id="btnAddText">➕ 文字を追加</button>
        <button id="btnDelText" disabled>🗑 この文字を削除</button>
      </div>
    </div>
    <label class="checkRow" id="keepDecoRow"><input type="checkbox" id="keepDeco" checked> 🫛 キャラや飾りを写真の上に残す</label>
    <div class="rowBtns">
      <button id="btnDetect">🔍 枠を自動検出しなおす</button>
    </div>
    <p class="hint" id="hintText">💡 むらさきの丸をドラッグすると枠の大きさ、枠の中をドラッグすると位置を動かせます。合わせた枠は自動で記憶されるので、同じフレームなら次回から調整いらずです。</p>
  </div>
</main>

<div id="modal">
  <div id="modalCard">
    <h3>✅ できあがり！</h3>
    <img id="resultImg" alt="完成画像">
    <div class="rowBtns">
      <button id="btnShare" class="main" hidden>📲 写真に保存 / 共有</button>
      <button id="btnDownload">⬇️ ダウンロード</button>
      <button id="btnClose">閉じる</button>
    </div>
    <p class="note">iPhoneでうまく保存できないときは、上の画像を長押し →「"写真"に追加」でも保存できます。</p>
  </div>
</div>

<script>
'use strict';
/* ============ 状態 ============ */
const S = {
  frame: null,   // {img, w, h, key, name}
  photo: null,   // {img, w, h}
  rect: null,    // {cx, cy, w, h, angle(rad), r(px)} フレーム画像ピクセル座標
  ph: { scale: 1, dx: 0, dy: 0 }, // 写真の拡大率(cover基準)と枠ローカル座標での平行移動
  adj: { bright: 0, warm: 0 },    // 写真の明るさ・色温度（-100〜100）
  texts: [],     // {str, fi, size, color, outline, outlineColor, curve, angle, x, y}
  selText: -1,
  mode: 'frame',
};
let lastBlob = null, lastBlobURL = null;

const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
const wrap = $('canvasWrap');

/* ============ 画像読み込み ============ */
function loadImg(src){
  return new Promise((ok, ng) => {
    const im = new Image();
    im.onload = () => ok(im);
    im.onerror = ng;
    im.src = src;
  });
}
async function loadFromFile(file){
  const url = URL.createObjectURL(file);
  try { return await loadImg(url); }
  finally { setTimeout(() => URL.revokeObjectURL(url), 5000); }
}

function loadScript(src){
  return new Promise((ok, ng) => {
    const s = document.createElement('script');
    s.onload = ok; s.onerror = ng; s.src = src;
    document.head.appendChild(s);
  });
}
/* HEIC等ブラウザが直接読めない形式は、その場で変換してから読む（変換もこの端末内で完結） */
async function decodeImageFile(file){
  try { return await loadFromFile(file); }
  catch(e){ /* 直接読めない形式 → HEIC変換を試す */ }
  if (!window.heic2any)
    await loadScript('https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js');
  const out = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 });
  return await loadFromFile(Array.isArray(out) ? out[0] : out);
}
function alertReadFail(){
  alert('この画像を読み込めませんでした🙏\n・電波の届く場所でもう一度試す\n・iPhoneなら、写真を選ぶ画面でスクリーンショットや別の写真を試す\nで直ることが多いです。');
}

/* ============ 背景除去（AI切り抜き・端末内で完結） ============ */
let bgRemovalMod = null;
async function cutBackground(){
  if (!S.photo || S.busyCutBg) return;
  S.busyCutBg = true;
  const btn = $('btnCutBg'), hint = $('hintText');
  const oldLabel = btn.textContent, oldHint = hint.textContent;
  btn.disabled = true;
  btn.textContent = '✂️ 準備中…';
  try {
    if (!bgRemovalMod) {
      hint.textContent = '✂️ AIの部品をダウンロード中…（初回だけ1〜2分かかります。2回目からは速いです）';
      bgRemovalMod = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm');
    }
    // 大きすぎる写真は縮小してから渡す（スマホのメモリ対策・十分な画質）
    const maxDim = 2000;
    const sc = Math.min(1, maxDim / Math.max(S.photo.w, S.photo.h));
    const c = document.createElement('canvas');
    c.width = Math.round(S.photo.w * sc); c.height = Math.round(S.photo.h * sc);
    c.getContext('2d').drawImage(S.photo.img, 0, 0, c.width, c.height);
    const blob = await new Promise(r => c.toBlob(r, 'image/png'));
    const out = await bgRemovalMod.removeBackground(blob, {
      progress: (key, cur, total) => {
        if (!total) return;
        const pct = Math.round(cur / total * 100);
        hint.textContent = key.startsWith('fetch')
          ? `✂️ AIの部品をダウンロード中… ${pct}%`
          : `✂️ 切り抜き中… ${pct}%`;
        btn.textContent = `✂️ ${pct}%`;
      },
    });
    const img = await loadFromFile(out);
    S.photoOrig = S.photo; // 「元に戻す」用にとっておく
    S.photo = { img, w: img.naturalWidth, h: img.naturalHeight };
    $('btnRestoreBg').hidden = false;
    draw();
    hint.textContent = '✂️ 背景を消しました！透けた部分にはフレームの地の色が見えます。「↩️ 元に戻す」でいつでも戻せます。';
  } catch(e) {
    hint.textContent = oldHint;
    alert('背景の切り抜きに失敗しました🙏\n電波の良い場所で、もう一度「✂️ 背景を消す」を押してみてください。');
  } finally {
    btn.disabled = false;
    btn.textContent = oldLabel;
    S.busyCutBg = false;
  }
}
$('btnCutBg').onclick = cutBackground;
$('btnRestoreBg').onclick = () => {
  if (!S.photoOrig) return;
  S.photo = S.photoOrig;
  S.photoOrig = null;
  $('btnRestoreBg').hidden = true;
  draw();
};

/* フレームの指紋（同じフレームを記憶するためのキー） */
function frameKey(img){
  const c = document.createElement('canvas'); c.width = 8; c.height = 8;
  const x = c.getContext('2d'); x.drawImage(img, 0, 0, 8, 8);
  const d = x.getImageData(0, 0, 8, 8).data;
  let h = 0;
  for (let i = 0; i < d.length; i += 4)
    h = (h * 31 + (d[i] >> 4) + (d[i+1] >> 4) * 17 + (d[i+2] >> 4) * 29) | 0;
  return 'frameTool:' + img.naturalWidth + 'x' + img.naturalHeight + ':' + h;
}

/* ============ 枠の自動検出 ============ */
/* 画像の中央付近から「種の色に近いピクセル」を洪水法で広げ、
   端に触れていない大きな均一領域＝写真を入れるパネルとみなす。
   （淡い水彩フレームは背景と枠の色差が小さいので、許容差は狭く・種の色と直接比較する） */
function detectPanel(img){
  const maxDim = 480;
  const sc = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.max(2, Math.round(img.naturalWidth * sc));
  const h = Math.max(2, Math.round(img.naturalHeight * sc));
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const x = c.getContext('2d', { willReadFrequently: true });
  x.drawImage(img, 0, 0, w, h);
  const d = x.getImageData(0, 0, w, h).data;
  const TOLS = [8, 11, 14, 18]; // 色の許容差（小→大）
  const regionAt = TOLS.map(() => new Int32Array(w * h).fill(-1));
  const results = [];
  let best = null;

  function floodAt(ti, sx, sy){
    const seed = sy * w + sx;
    if (regionAt[ti][seed] >= 0) return results[regionAt[ti][seed]]; // 同じ領域は再計算しない
    const tol = TOLS[ti];
    const mark = regionAt[ti];
    const id = results.length;
    const r0 = d[seed*4], g0 = d[seed*4+1], b0 = d[seed*4+2];
    const stack = [seed];
    mark[seed] = id;
    let n = 0, touches = false;
    const pts = [];
    while (stack.length) {
      const i = stack.pop();
      const px = i % w, py = (i / w) | 0;
      pts.push(i); n++;
      if (px === 0 || py === 0 || px === w-1 || py === h-1) touches = true;
      for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx = px + dx, ny = py + dy;
        if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
        const j = ny * w + nx;
        if (mark[j] >= 0) continue;
        if (Math.abs(d[j*4] - r0) < tol && Math.abs(d[j*4+1] - g0) < tol && Math.abs(d[j*4+2] - b0) < tol) {
          mark[j] = id;
          stack.push(j);
        }
      }
    }
    const res = { n, touches, pts };
    results.push(res);
    return res;
  }

  // 回転を含む最小外接矩形（角度を振って最小面積を探す）
  function minAreaRect(pts, wImg){
    const step = Math.max(1, Math.floor(pts.length / 4000));
    const P = [];
    for (let i = 0; i < pts.length; i += step)
      P.push([pts[i] % wImg, (pts[i] / wImg) | 0]);
    let fit = null;
    for (let deg = -20; deg <= 20; deg += 0.4) {
      const t = deg * Math.PI / 180, co = Math.cos(t), si = Math.sin(t);
      let mnU = Infinity, mxU = -Infinity, mnV = Infinity, mxV = -Infinity;
      for (const [px, py] of P) {
        const u = px*co + py*si, v = -px*si + py*co;
        if (u < mnU) mnU = u; if (u > mxU) mxU = u;
        if (v < mnV) mnV = v; if (v > mxV) mxV = v;
      }
      const area = (mxU-mnU) * (mxV-mnV);
      if (!fit || area < fit.area) fit = { area, t, co, si, mnU, mxU, mnV, mxV };
    }
    return fit;
  }

  // パネルはだいたい中央寄りにあるので、中央周辺の5x5グリッドから種を撒く。
  // 淡い色同士で境界が曖昧なため、許容差を小→大に広げながら領域サイズを観察し、
  // 「急にサイズが跳ねる（＝背景に漏れた）」直前の安定した領域を採用する。
  const total = w * h;
  for (const fy of [0.3, 0.4, 0.5, 0.6, 0.7]) {
    for (const fx of [0.3, 0.4, 0.5, 0.6, 0.7]) {
      const sx = Math.round(w * fx), sy = Math.round(h * fy);
      let chosen = null;
      for (let ti = 0; ti < TOLS.length; ti++) {
        const reg = floodAt(ti, sx, sy);
        const valid = !reg.touches && reg.n >= total * 0.08 && reg.n <= total * 0.82;
        if (!chosen) { if (valid) chosen = reg; continue; }
        if (!valid) break;
        if (reg.n > chosen.n * 1.25) break; // 急拡大＝境界を越えて漏れた
        chosen = reg;
      }
      if (!chosen) continue;
      if (!chosen.fit) chosen.fit = minAreaRect(chosen.pts, w);
      const rectFill = chosen.n / Math.max(1, chosen.fit.area);
      if (rectFill < 0.7) continue; // 矩形に埋まらない形→枠ではない
      if (!best || chosen.n > best.n) best = { n: chosen.n, pts: chosen.pts, fit: chosen.fit };
    }
  }

  if (!best) {
    // 検出できないフレーム（全面柄など）→ 中央にデフォルト枠
    return { cx: img.naturalWidth/2, cy: img.naturalHeight/2,
             w: img.naturalWidth*0.72, h: img.naturalHeight*0.6, angle: 0 };
  }

  const fit = best.fit;
  const cu = (fit.mnU + fit.mxU) / 2, cvv = (fit.mnV + fit.mxV) / 2;
  const cxS = cu*fit.co - cvv*fit.si, cyS = cu*fit.si + cvv*fit.co;
  const inv = 1 / sc;
  return {
    cx: cxS * inv, cy: cyS * inv,
    w: (fit.mxU - fit.mnU) * inv * 0.99,  // 白フチに食い込まないよう少し内側に
    h: (fit.mxV - fit.mnV) * inv * 0.99,
    angle: fit.t,
  };
}

/* ============ 枠の記憶（localStorage） ============ */
let saveTimer = null;
function scheduleSaveRect(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (!S.frame || !S.rect) return;
    buildOverlay(); // 枠が動いたら前面レイヤーも作り直す
    draw();
    const F = S.frame, R = S.rect;
    try {
      localStorage.setItem(F.key, JSON.stringify({
        cx: R.cx/F.w, cy: R.cy/F.h, w: R.w/F.w, h: R.h/F.h,
        angle: R.angle, rPct: R.r / Math.max(1, Math.min(R.w, R.h)),
      }));
    } catch(e){ /* プライベートモード等では記憶しないだけ */ }
  }, 400);
}
function loadSavedRect(){
  try {
    const raw = localStorage.getItem(S.frame.key);
    if (!raw) return null;
    const v = JSON.parse(raw);
    const w = v.w * S.frame.w, h = v.h * S.frame.h;
    return { cx: v.cx*S.frame.w, cy: v.cy*S.frame.h, w, h,
             angle: v.angle, r: v.rPct * Math.min(w, h) };
  } catch(e){ return null; }
}

/* ============ 前面レイヤー（キャラ・マステ等の切り出し） ============ */
/* 枠の中でパネルの地の色と明らかに違うピクセル＝上に重なっている飾りとみなし、
   写真より前面に描き直す。これで「前に出てるものは前」のまま合成できる。 */
let overlayCanvas = null;
function buildOverlay(){
  overlayCanvas = null;
  if (!S.frame || !S.rect) return;
  const W = S.frame.w, H = S.frame.h;
  if (W * H > 6000000) return; // 巨大画像は安全のため省略
  const { cx, cy, w, h, angle } = S.rect;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d', { willReadFrequently: true });
  x.drawImage(S.frame.img, 0, 0);
  const id = x.getImageData(0, 0, W, H), d = id.data;
  const co = Math.cos(angle), si = Math.sin(angle);
  // パネルの地の色＝枠中央付近からサンプリングした中央値（飾りに引っ張られない）
  const sm = [[], [], []];
  for (let i = 0; i < 500; i++) {
    const lx = (Math.random() - 0.5) * w * 0.5, ly = (Math.random() - 0.5) * h * 0.5;
    const px = Math.round(cx + lx*co - ly*si), py = Math.round(cy + lx*si + ly*co);
    if (px < 0 || py < 0 || px >= W || py >= H) continue;
    const j = (py*W + px) * 4;
    sm[0].push(d[j]); sm[1].push(d[j+1]); sm[2].push(d[j+2]);
  }
  if (!sm[0].length) return;
  const med = sm.map(a => a.sort((p, q) => p - q)[a.length >> 1]);
  const cs = rectCorners();
  const bx0 = Math.max(0, Math.floor(Math.min(...cs.map(p => p.x))));
  const bx1 = Math.min(W-1, Math.ceil(Math.max(...cs.map(p => p.x))));
  const by0 = Math.max(0, Math.floor(Math.min(...cs.map(p => p.y))));
  const by1 = Math.min(H-1, Math.ceil(Math.max(...cs.map(p => p.y))));
  const t0 = 25, t1 = 50; // 地の色との差がこの範囲で徐々に「飾り」判定（紙の質感は拾わない）
  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const j = (py*W + px) * 4;
      let a = 0;
      if (px >= bx0 && px <= bx1 && py >= by0 && py <= by1) {
        const dx = px - cx, dy = py - cy;
        const lx = dx*co + dy*si, ly = -dx*si + dy*co;
        if (Math.abs(lx) <= w/2 && Math.abs(ly) <= h/2) {
          const dist = Math.max(Math.abs(d[j]-med[0]), Math.abs(d[j+1]-med[1]), Math.abs(d[j+2]-med[2]));
          a = Math.max(0, Math.min(1, (dist - t0) / (t1 - t0)));
        }
      }
      d[j+3] = a * 255;
    }
  }
  x.putImageData(id, 0, 0);
  overlayCanvas = c;
}

/* ============ 文字入れ ============ */
/* 先頭はiPhone/Macに元から入っている丸ゴシック＝オフラインでも必ず出る。
   残りはGoogle Fontsから必要な文字ぶんだけ読み込む（文字モードを開いたときに開始） */
const FONTS = [
  { label: 'まるゴシック（標準）', fam: '"Hiragino Maru Gothic ProN","Zen Maru Gothic",sans-serif', w: 700, gf: 'Zen+Maru+Gothic:wght@700' },

  { label: 'はちまるポップ（ゆる手書き）', fam: '"Hachi Maru Pop"', w: 400, gf: 'Hachi+Maru+Pop' },
  { label: 'よもぎ（ほそ手書き）', fam: '"Yomogi"', w: 400, gf: 'Yomogi' },
  { label: 'マジックペン', fam: '"Yusei Magic"', w: 400, gf: 'Yusei+Magic' },
  { label: 'もちもちポップ（太め）', fam: '"Mochiy Pop One"', w: 400, gf: 'Mochiy+Pop+One' },
  { label: 'クレー（きれいな手書き）', fam: '"Klee One"', w: 600, gf: 'Klee+One:wght@600' },
  { label: 'ごくぶと（インパクト）', fam: '"Dela Gothic One"', w: 400, gf: 'Dela+Gothic+One' },
  { label: '明朝（上品）', fam: '"Shippori Mincho"', w: 600, gf: 'Shippori+Mincho:wght@600' },
];
const PALETTE = ['#ffffff', '#5a4a63', '#8e6aa8', '#e08bb0', '#e8a13c', '#7fae6f', '#6f9ec7', '#e05c5c'];
let fontCSSLoaded = false;
function ensureFontCSS(){
  if (fontCSSLoaded) return;
  fontCSSLoaded = true;
  const fams = [...new Set(FONTS.filter(f => f.gf).map(f => 'family=' + f.gf))];
  const l = document.createElement('link');
  l.rel = 'stylesheet';
  l.href = 'https://fonts.googleapis.com/css2?' + fams.join('&') + '&display=swap';
  document.head.appendChild(l);
}
const measCtx = document.createElement('canvas').getContext('2d');
const selT = () => S.texts[S.selText] || null;
function fontStr(t){ const f = FONTS[t.fi]; return f.w + ' ' + t.size + 'px ' + f.fam; }
async function ensureFont(t){
  ensureFontCSS();
  const f = FONTS[t.fi];
  if (f.gf) { try { await document.fonts.load(f.w + ' 32px ' + f.fam, t.str + 'あ0A'); } catch(e){} }
  draw(); // フォントが届いたら描き直す
}
function measureTextT(t){
  measCtx.font = fontStr(t);
  const lines = t.str.split('\n');
  const lh = t.size * 1.25;
  let wMax = 1;
  for (const l of lines) wMax = Math.max(wMax, measCtx.measureText(l).width);
  let sag = 0;
  if (Math.abs(t.curve) >= 1) {
    const arc = Math.abs(t.curve) / 100 * Math.PI;
    sag = wMax / arc * (1 - Math.cos(arc / 2));
  }
  t._hw = wMax / 2;
  t._hh = lh * lines.length / 2 + sag / 2;
  return { lines, lh };
}
/* 1行をアーチ状に描く。curve>0で虹型（上に凸）、<0で谷型 */
function drawArcLine(c, t, line, y0){
  const chars = [...line];
  if (!chars.length) return;
  const widths = chars.map(ch => c.measureText(ch).width);
  const total = Math.max(1, widths.reduce((a, b) => a + b, 0));
  const R = total / (Math.abs(t.curve) / 100 * Math.PI); // curve=100で半円
  const up = t.curve > 0;
  let a = -total / (2 * R);
  for (let i = 0; i < chars.length; i++) {
    const half = widths[i] / 2 / R;
    a += half;
    c.save();
    c.translate(Math.sin(a) * R, up ? y0 + R * (1 - Math.cos(a)) : y0 - R * (1 - Math.cos(a)));
    c.rotate(up ? a : -a);
    if (t.outline) c.strokeText(chars[i], 0, 0);
    c.fillText(chars[i], 0, 0);
    c.restore();
    a += half;
  }
}
function drawOneText(c, t, k){
  const m = measureTextT(t);
  if (!t.str.trim()) return;
  c.save();
  c.translate(t.x * k, t.y * k);
  c.rotate(t.angle);
  c.scale(k, k);
  c.font = fontStr(t);
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = t.color;
  if (t.outline) {
    c.lineWidth = t.size * 0.18;
    c.lineJoin = 'round';
    c.strokeStyle = t.outlineColor;
  }
  m.lines.forEach((line, li) => {
    const y0 = (li - (m.lines.length - 1) / 2) * m.lh;
    if (Math.abs(t.curve) < 1) {
      if (t.outline) c.strokeText(line, 0, y0);
      c.fillText(line, 0, y0);
    } else {
      drawArcLine(c, t, line, y0);
    }
  });
  c.restore();
}
function drawTexts(c, k){ for (const t of S.texts) drawOneText(c, t, k); }
function localOfText(p, t){
  const dx = p.x - t.x, dy = p.y - t.y;
  const co = Math.cos(t.angle), si = Math.sin(t.angle);
  return { x: dx*co + dy*si, y: -dx*si + dy*co };
}
function addText(){

}

/* ============ 描画 ============ */
function roundRectPath(c, x, y, w, h, r){
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y,   x+w, y+h, r);
  c.arcTo(x+w, y+h, x,   y+h, r);
  c.arcTo(x,   y+h, x,   y,   r);
  c.arcTo(x,   y,   x+w, y,   r);
  c.closePath();
}
function drawPhotoInto(c, k){
  const { cx, cy, w, h, angle, r } = S.rect;
  c.save();
  c.translate(cx*k, cy*k); c.rotate(angle);
  roundRectPath(c, -w/2*k, -h/2*k, w*k, h*k, r*k);
  c.clip();
  const cover = Math.max(w / S.photo.w, h / S.photo.h);
  const s = cover * S.ph.scale * k;
  c.drawImage(S.photo.img,
    S.ph.dx*k - S.photo.w*s/2, S.ph.dy*k - S.photo.h*s/2,
    S.photo.w*s, S.photo.h*s);
  // 明るさ・暖かさ（クリップ内＝写真の範囲だけに色レイヤーを重ねる。
  // ctx.filter非対応のブラウザでも動くよう合成モードで実現）
  const { bright, warm } = S.adj;
  if (bright) {
    const v = Math.round(Math.abs(bright) / 100 * 140);
    c.globalCompositeOperation = bright > 0 ? 'screen' : 'multiply';
    c.fillStyle = bright > 0 ? `rgb(${v},${v},${v})` : `rgb(${255-v},${255-v},${255-v})`;
    c.fillRect(-w/2*k, -h/2*k, w*k, h*k);
  }
  if (warm) {
    c.globalCompositeOperation = 'soft-light';
    c.globalAlpha = Math.min(1, Math.abs(warm) / 100 * 0.9);
    c.fillStyle = warm > 0 ? 'rgb(255,138,48)' : 'rgb(64,140,255)';
    c.fillRect(-w/2*k, -h/2*k, w*k, h*k);
    c.globalAlpha = 1;
  }
  c.globalCompositeOperation = 'source-over';
  c.restore();
  // 前面レイヤー（キャラ・マステ等）を写真の上に描き戻す
  if (overlayCanvas && $('keepDeco').checked)
    c.drawImage(overlayCanvas, 0, 0, S.frame.w*k, S.frame.h*k);
}
function rectCorners(){
  const { cx, cy, w, h, angle } = S.rect;
  const co = Math.cos(angle), si = Math.sin(angle);
  return [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]]
    .map(([x,y]) => ({ x: cx + x*co - y*si, y: cy + x*si + y*co }));
}
function scaleK(){ return cv.width / S.frame.w; }

function draw(){
  if (!S.frame) return;
  const k = scaleK();
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.drawImage(S.frame.img, 0, 0, cv.width, cv.height);
  if (S.photo && S.rect) drawPhotoInto(ctx, k);
  drawTexts(ctx, k);
  if (S.mode === 'text' && selT()) {
    // 選択中の文字のまわりに点線
    const t = selT();
    ctx.save();
    ctx.translate(t.x*k, t.y*k); ctx.rotate(t.angle);
    ctx.lineWidth = Math.max(2, cv.width / 300);
    ctx.strokeStyle = 'rgba(142,106,168,.9)';
    ctx.setLineDash([8, 6]);
    ctx.strokeRect(-(t._hw+14)*k, -(t._hh+14)*k, (t._hw+14)*2*k, (t._hh+14)*2*k);
    ctx.restore();
  }
  if (S.rect && S.mode === 'frame') {
    // 枠の点線とハンドル
    const cs = rectCorners();
    ctx.save();
    ctx.lineWidth = Math.max(2, cv.width / 300);
    ctx.strokeStyle = 'rgba(142,106,168,.95)';
    ctx.setLineDash([10, 7]);
    ctx.beginPath();
    cs.forEach((p, i) => i ? ctx.lineTo(p.x*k, p.y*k) : ctx.moveTo(p.x*k, p.y*k));
    ctx.closePath(); ctx.stroke();
    ctx.setLineDash([]);
    const hr = Math.max(9, cv.width / 55);
    for (const p of cs) {
      ctx.beginPath(); ctx.arc(p.x*k, p.y*k, hr, 0, 7);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.lineWidth = Math.max(2.5, cv.width / 260);
      ctx.strokeStyle = '#8e6aa8'; ctx.stroke();
    }
    ctx.restore();
  }
}

function fitCanvas(){
  if (!S.frame) return;
  const cssW = wrap.clientWidth || 500;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const innerW = Math.min(1400, Math.round(cssW * dpr));
  cv.width = innerW;
  cv.height = Math.round(innerW * S.frame.h / S.frame.w);
  draw();
}

/* ============ フレーム/写真セット ============ */
function setFrame(img, name){

  const saved = loadSavedRect();

  } else {

/* ============ 写真のはみ出し防止（枠にすき間を作らない） ============ */
function clampPan(){
  if (!S.photo || !S.rect) return;
  const { w, h } = S.rect;
  const cover = Math.max(w / S.photo.w, h / S.photo.h);
  const s = cover * S.ph.scale;
  const mx = Math.max(0, (S.photo.w * s - w) / 2);
  const my = Math.max(0, (S.photo.h * s - h) / 2);
  S.ph.dx = Math.min(mx, Math.max(-mx, S.ph.dx));
  S.ph.dy = Math.min(my, Math.max(-my, S.ph.dy));
}

    : m === 'photo'

    : '💡 「➕ 文字を追加」→下の欄に入力。文字はドラッグで移動、2本指ピンチで大きさ、「カーブ」のスライダーで虹みたいに曲げられます🌈';
  draw();
}

  const f = e.target.files[0]; e.target.value = '';
  if (!f) return;
  try { setFrame(await decodeImageFile(f), f.name); }
  catch(err){ alertReadFail(); }
};
$('photoInput').onchange = async e => {
  const f = e.target.files[0]; e.target.value = '';
  if (!f) return;
  try { setPhoto(await decodeImageFile(f)); }
  catch(err){ alertReadFail(); }
};
['dragover', 'dragenter'].forEach(ev => wrap.addEventListener(ev, e => {
  e.preventDefault(); wrap.classList.add('drag');
}));
['dragleave', 'drop'].forEach(ev => wrap.addEventListener(ev, e => {
  e.preventDefault(); wrap.classList.remove('drag');
}));
wrap.addEventListener('drop', async e => {
  const files = [...e.dataTransfer.files]
    .filter(f => f.type.startsWith('image/') || /\.hei[cf]$/i.test(f.name));
  if (!files.length) return;
  try {
    if (files.length >= 2) {
      setFrame(await decodeImageFile(files[0]), files[0].name);
      setPhoto(await decodeImageFile(files[1]));
    } else if (!S.frame) {
      setFrame(await decodeImageFile(files[0]), files[0].name);
    } else {
      setPhoto(await decodeImageFile(files[0]));
    }
  } catch(err){ alertReadFail(); }
});

/* ============ ポインタ操作（マウス・タッチ共通） ============ */
const pointers = new Map();
let dragState = null;

function toFrameXY(e){
  const r = cv.getBoundingClientRect();
  const k = scaleK();
  return {
    x: (e.clientX - r.left) * (cv.width / r.width) / k,
    y: (e.clientY - r.top) * (cv.height / r.height) / k,
  };
}
function localOf(p){
  const { cx, cy, angle } = S.rect;
  const dx = p.x - cx, dy = p.y - cy;
  const co = Math.cos(angle), si = Math.sin(angle);
  return { x: dx*co + dy*si, y: -dx*si + dy*co };
}

cv.addEventListener('pointerdown', e => {
  if (!S.frame || !S.rect) return;
  cv.setPointerCapture(e.pointerId);
  const p = toFrameXY(e);
  pointers.set(e.pointerId, p);
  e.preventDefault();

  if (pointers.size === 2 && S.mode === 'photo') {
    const [a, b] = [...pointers.values()];
    dragState = { type: 'pinch', dist: Math.hypot(a.x-b.x, a.y-b.y), scale0: S.ph.scale };
    return;
  }
  if (pointers.size === 2 && S.mode === 'text' && selT()) {
    const [a, b] = [...pointers.values()];
    dragState = { type: 'pinchText', dist: Math.hypot(a.x-b.x, a.y-b.y), size0: selT().size };
    return;
  }
  if (S.mode === 'text') {
    for (let i = S.texts.length - 1; i >= 0; i--) {
      const t = S.texts[i], l = localOfText(p, t);
      const pad = S.frame.w * 0.02;
      if (Math.abs(l.x) < (t._hw || 0) + pad && Math.abs(l.y) < (t._hh || 0) + pad) {
        S.selText = i; syncTextControls();
        dragState = { type: 'textMove', off: { x: p.x - t.x, y: p.y - t.y } };
        draw();
        return;
      }
    }
    return;
  }
  if (S.mode === 'frame') {
    const k = scaleK();
    const cs = rectCorners();
    const hitR = Math.max(9, cv.width / 55) / k * 1.6;
    for (let i = 0; i < 4; i++) {
      if (Math.hypot(p.x - cs[i].x, p.y - cs[i].y) < hitR) {
        dragState = { type: 'corner', opp: cs[(i+2) % 4] };
        return;
      }
    }
    const l = localOf(p);
    if (Math.abs(l.x) < S.rect.w/2 && Math.abs(l.y) < S.rect.h/2) {
      dragState = { type: 'move', off: { x: p.x - S.rect.cx, y: p.y - S.rect.cy } };
    }
  } else if (S.mode === 'photo' && S.photo) {
    dragState = { type: 'pan', last: p };
  }
});

cv.addEventListener('pointermove', e => {
  if (!dragState || !pointers.has(e.pointerId)) return;
  const p = toFrameXY(e);
  pointers.set(e.pointerId, p);
  e.preventDefault();
  const R = S.rect;
  const co = Math.cos(R.angle), si = Math.sin(R.angle);

  if (dragState.type === 'pinch' && pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    S.ph.scale = Math.min(4, Math.max(1, dragState.scale0 * d / dragState.dist));
    $('zoomSlider').value = S.ph.scale;
    clampPan(); draw();
    return;
  }
  if (dragState.type === 'pinchText' && pointers.size === 2) {
    const t = selT();
    if (t) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x-b.x, a.y-b.y);
      t.size = Math.min(S.frame.w*0.25, Math.max(S.frame.w*0.02, dragState.size0 * d / dragState.dist));
      $('textSizeSlider').value = (t.size / S.frame.w * 100).toFixed(1);
      draw();
    }
    return;
  }
  if (dragState.type === 'textMove') {
    const t = selT();
    if (t) { t.x = p.x - dragState.off.x; t.y = p.y - dragState.off.y; draw(); }
    return;
  }
  if (dragState.type === 'corner') {
    const O = dragState.opp;
    const vx = p.x - O.x, vy = p.y - O.y;
    const lu = vx*co + vy*si, lv = -vx*si + vy*co;
    R.w = Math.max(40, Math.abs(lu));
    R.h = Math.max(40, Math.abs(lv));
    R.cx = O.x + (lu/2)*co - (lv/2)*si;
    R.cy = O.y + (lu/2)*si + (lv/2)*co;
    R.r = parseFloat($('radiusSlider').value) / 100 * Math.min(R.w, R.h);
    clampPan(); draw(); scheduleSaveRect();
  } else if (dragState.type === 'move') {
    R.cx = p.x - dragState.off.x;
    R.cy = p.y - dragState.off.y;
    draw(); scheduleSaveRect();
  } else if (dragState.type === 'pan') {
    const dx = p.x - dragState.last.x, dy = p.y - dragState.last.y;
    S.ph.dx += dx*co + dy*si;
    S.ph.dy += -dx*si + dy*co;
    dragState.last = p;
    clampPan(); draw();
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if (pointers.size === 0) dragState = null;
  else if (dragState && dragState.type === 'pinch' && pointers.size === 1) {
    dragState = { type: 'pan', last: [...pointers.values()][0] };
  }
  else if (dragState && dragState.type === 'pinchText') dragState = null;
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', endPointer);

cv.addEventListener('wheel', e => {
  if (!S.photo || !S.rect) return;
  e.preventDefault();
  S.ph.scale = Math.min(4, Math.max(1, S.ph.scale * Math.exp(-e.deltaY * 0.0015)));
  $('zoomSlider').value = S.ph.scale;
  clampPan(); draw();
}, { passive: false });

/* ============ 書き出し ============ */
function renderExport(){
  const c = document.createElement('canvas');
  c.width = S.frame.w; c.height = S.frame.h;
  const x = c.getContext('2d');
  x.drawImage(S.frame.img, 0, 0);
  if (S.photo && S.rect) drawPhotoInto(x, 1);
  drawTexts(x, 1);
  return c;
}
function exportName(){
  const d = new Date();
  const z = n => String(n).padStart(2, '0');
  return `フレーム合成_${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}${z(d.getSeconds())}.png`;
}
$('btnSave').onclick = () => {
  renderExport().toBlob(blob => {
    lastBlob = blob;
    if (lastBlobURL) URL.revokeObjectURL(lastBlobURL);
    lastBlobURL = URL.createObjectURL(blob);
    $('resultImg').src = lastBlobURL;
    const f = new File([blob], exportName(), { type: 'image/png' });
    $('btnShare').hidden = !(navigator.canShare && navigator.canShare({ files: [f] }));
    $('modal').classList.add('show');
  }, 'image/png');
};
$('btnShare').onclick = async () => {
  if (!lastBlob) return;
  try {
    await navigator.share({ files: [new File([lastBlob], exportName(), { type: 'image/png' })] });
  } catch(e){ /* キャンセルは無視 */ }
};
$('btnDownload').onclick = () => {
  if (!lastBlobURL) return;
  const a = document.createElement('a');
  a.href = lastBlobURL; a.download = exportName();
  document.body.appendChild(a); a.click(); a.remove();
};
$('btnClose').onclick = () => $('modal').classList.remove('show');
$('modal').addEventListener('click', e => { if (e.target === $('modal')) $('btnClose').onclick(); });

/* ============ 動作確認用フック（通常利用では使わない） ============ */
window.__test = {
  async loadFrame(url){ setFrame(await loadImg(url), url.split('/').pop()); },
  async loadPhoto(url){ setPhoto(await loadImg(url)); },
  rect: () => S.rect,
  texts: () => S.texts,
  addText,
  exportDataURL: () => renderExport().toDataURL('image/png'),
};
</script>
